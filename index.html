<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>✧*̥ cdcord // tropical beach client *̥✧</title>
    <style>
        /* Basic, Unblockable Styles using standard Chromebook Core Fonts */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, sans-serif;
        }
        body {
            height: 100vh;
            display: flex;
            flex-direction: column;
            color: #032b30;
            overflow: hidden;
            background: linear-gradient(135deg, #00f2fe 0%, #4facfe 35%, #ff758f 75%, #ffbc00 100%) !important;
            background-attachment: fixed;
        }

        /* --- THE AUTH BOX OVERLAY (FORCED INITIAL DISPLAY) --- */
        .auth-wrapper {
            position: fixed;
            top: 0; left: 0; width: 100vw; height: 100vh;
            background: rgba(0, 0, 0, 0.15);
            z-index: 9999;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .auth-box {
            background: rgb(255, 255, 255);
            border: 2px solid rgba(255,255,255,0.7);
            border-radius: 24px;
            padding: 40px;
            width: 90%;
            max-width: 420px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.15);
            text-align: center;
        }
        .auth-box h2 { font-size: 26px; margin-bottom: 8px; color: #032b30; font-weight: 800; }
        .auth-box p { font-size: 14px; color: #1b5a63; margin-bottom: 24px; font-weight: 500; }
        .input-group { text-align: left; margin-bottom: 16px; width: 100%; }
        .input-group label { display: block; font-size: 11px; text-transform: uppercase; font-weight: 800; color: #032b30; margin-bottom: 6px; letter-spacing: 0.5px; }
        .input-group input { width: 100%; padding: 12px 16px; border-radius: 30px; border: 2px solid #ccc; background: #fff; font-size: 14px; outline: none; color: #032b30; }
        
        /* The Unlock Button: Acting as an immediate access routing switch */
        .auth-btn { 
            display: block;
            text-align: center;
            text-decoration: none;
            width: 100%; padding: 14px; border: none; border-radius: 30px; 
            background: linear-gradient(135deg, #ff9ff3 0%, #f368e0 100%); 
            color: white; font-weight: 700; font-size: 15px; 
            box-shadow: 0 4px 15px rgba(243,104,224,0.3); margin-top: 10px; margin-bottom: 15px; 
        }

        /* --- PURE CSS TAB CONTROLLERS (Hiding the gate when clicking register) --- */
        #gate-toggle { display: none; }
        #gate-toggle:checked ~ .auth-wrapper { display: none !important; }

        /* ---------------- CHAT WORKSPACE DESIGN ---------------- */
        header {
            background: rgba(255, 255, 255, 0.4);
            padding: 15px 25px;
            border-bottom: 2px solid rgba(255, 255, 255, 0.5);
            display: flex;
            justify-content: space-between;
            align-items: center;
            height: 60px;
        }
        .brand-logo { font-size: 26px; font-weight: 800; color: #032b30; letter-spacing: -1px; }

        .main-container { display: flex; flex: 1; overflow: hidden; padding: 15px; gap: 12px; height: calc(100vh - 60px); }
        .server-sidebar { width: 72px; background: rgba(255, 255, 255, 0.3); border-radius: 24px; border: 2px solid rgba(255, 255, 255, 0.4); display: flex; flex-direction: column; align-items: center; padding-top: 15px; gap: 12px; }
        .server-icon { width: 46px; height: 46px; border-radius: 50%; background: linear-gradient(180deg, #ff9ff3 0%, #f368e0 100%); display: flex; align-items: center; justify-content: center; font-weight: 700; color: white; font-size: 18px; border: 2px solid white; }
        .server-icon.active { border-radius: 16px; background: linear-gradient(135deg, #00f2fe 0%, #4facfe 100%); color: #032b30; }
        
        .channel-sidebar { width: 240px; background: rgba(255, 255, 255, 0.4); border-radius: 24px; border: 2px solid rgba(255, 255, 255, 0.4); display: flex; flex-direction: column; overflow: hidden; }
        .server-title-bar { padding: 18px; font-size: 16px; font-weight: 800; border-bottom: 1px solid rgba(255,255,255,0.3); text-align: left; }
        .channel-list { padding: 15px 10px; display: flex; flex-direction: column; gap: 4px; flex: 1; overflow-y: auto; }
        .category-title { font-size: 11px; text-transform: uppercase; font-weight: 800; color: #1b5a63; margin-top: 12px; padding-left: 8px; text-align: left; }
        .channel-item { padding: 9px 14px; border-radius: 30px; display: flex; align-items: center; gap: 8px; font-size: 14px; font-weight: 700; color: #032b30; text-decoration: none; }
        .channel-item::before { content: '#'; font-weight: 800; color: #ff758f; }
        .channel-item.active { background: rgba(255, 255, 255, 0.6); color: #000; }
        
        .user-footer { padding: 12px; background: rgba(255,255,255,0.3); border-top: 1px solid rgba(255,255,255,0.3); display: flex; align-items: center; gap: 10px; }
        .user-avatar { width: 32px; height: 32px; border-radius: 50%; background: #ff758f; border: 2px solid white; }
        .user-info { text-align: left; }
        .user-name { font-size: 13px; font-weight: 700; color: #000; }
        .user-tag { font-size: 11px; color: #1b5a63; }

        .chat-area { flex: 1; background: rgba(255, 255, 255, 0.45); border-radius: 24px; border: 2px solid rgba(255, 255, 255, 0.4); display: flex; flex-direction: column; overflow: hidden; }
        .chat-header { padding: 16px 20px; border-bottom: 1px solid rgba(255,255,255,0.3); font-size: 15px; font-weight: 800; text-align: left; }
        .chat-header::before { content: '#'; color: #ff758f; margin-right: 4px; }
        
        /* --- 🎀 Y2K ROLLING BANNER MARQUEE --- */
        .marquee-banner {
            background: linear-gradient(90deg, #ff9ff3, #f368e0);
            color: white;
            padding: 6px 0;
            font-size: 12px;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 1px;
            overflow: hidden;
            white-space: nowrap;
            border-bottom: 1px solid rgba(255,255,255,0.3);
        }
        .marquee-text { display: inline-block; padding-left: 100%; animation: marquee 15s linear infinite; }
        @keyframes marquee { 0% { transform: translate3d(0, 0, 0); } 100% { transform: translate3d(-100%, 0, 0); } }

        .message-stream { flex: 1; padding: 20px; display: flex; flex-direction: column; gap: 16px; overflow-y: auto; }
        .msg-card { display: flex; gap: 14px; text-align: left; }
        .msg-avatar { width: 38px; height: 38px; border-radius: 50%; background: #4facfe; border: 2px solid white; flex-shrink: 0; }
        .msg-avatar.pink { background: #ff9ff3; }
        .msg-avatar.green { background: #70e000; }
        .msg-details { display: flex; flex-direction: column; }
        .msg-author { font-size: 14px; font-weight: 700; color: #000; }
        .msg-time { font-size: 11px; color: #1b5a63; font-weight: 500; margin-left: 6px; }
        .msg-body { font-size: 14px; color: #032b30; margin-top: 3px; font-weight: 500; }
        
        .chat-input-bar { padding: 20px; }
        .input-box-wrapper { background: rgba(255, 255, 255, 0.6); border: 2px solid rgba(255, 255, 255, 0.7); border-radius: 30px; padding: 12px 20px; display: flex; align-items: center; }
        .input-box-wrapper input { flex: 1; background: transparent; border: none; outline: none; font-size: 14px; font-weight: 500; color: #032b30; }
        .send-btn { background: linear-gradient(135deg, #ff9ff3 0%, #f368e0 100%); border: none; color: white; padding: 7px 18px; border-radius: 20px; font-weight: 700; margin-left: 10px; font-size: 12px; text-decoration: none; }
    </style>
</head>
<body>

    <!-- Hidden CSS trigger to unlock the screen without script execution -->
    <input type="checkbox" id="gate-toggle">

    <!-- 🚪 SIGN UP GATEWAY CONTAINER -->
    <div class="auth-wrapper">
        <div class="auth-box">
            <h2>Create an account</h2>
            <p>Join the brainrot aero beach club 🌺</p>
            <div class="input-group">
                <label>Username</label>
                <input type="text" placeholder="Choose a username" value="BeachGirl06">
            </div>
            <div class="input-group">
                <label>Password</label>
                <input type="password" placeholder="Choose a password" value="aloha123">
            </div>
            <!-- Clicking this labels targets the hidden checkbox and completely deletes the overlay gate -->
            <label for="gate-toggle" class="auth-btn">Register & Log In 🚀</label>
        </div>
    </div>

    <!-- 🌐 MAIN APP WRAPPER -->
    <header>
        <div class="brand-logo">✿ cdcord <span>hub</span> ✿</div>
    </header>

    <div class="main-container">
        <div id="discord-view">
            <div class="server-sidebar">
                <div class="server-icon active">🌺</div>
                <div class="server-icon">🐬</div>
                <div class="server-icon">🍉</div>
            </div>

            <div class="channel-sidebar">
                <div class="server-title-bar">Brainrot Beach Club</div>
                <div class="channel-list">
                    <div class="category-title">Text Channels</div>
                    <a href="#" class="channel-item active">announcements</a>
                    <a href="#" class="channel-item">rizz-academy</a>
                    <a href="#" class="channel-item">mewing-streak</a>
                </div>
                <div class="user-footer">
                    <div class="user-avatar"></div>
                    <div class="user-info">
                        <div class="user-name">BeachGirl06</div>
